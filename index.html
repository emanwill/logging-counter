<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#111111">
<title>Event Recorder</title>
<link rel="manifest" href="./manifest.json">
<style>
  :root {
    --bg: #111;
    --bg-elev: #1c1c1e;
    --bg-elev-2: #2a2a2d;
    --fg: #f2f2f2;
    --fg-dim: #9a9a9e;
    --border: #38383b;
    --accent: #1e88e5;
    --danger: #e53935;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  [hidden] { display: none !important; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--fg);
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  input { user-select: text; }

  /* Screen routing */
  .screen { display: none; flex-direction: column; min-height: 100dvh; }
  body[data-screen="main"]     #screen-main,
  body[data-screen="logs"]     #screen-logs,
  body[data-screen="settings"] #screen-settings { display: flex; }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: calc(env(safe-area-inset-top) + 10px) 14px 10px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .header h1 {
    margin: 0;
    font-size: 17px;
    font-weight: 600;
    flex: 1;
    letter-spacing: 0.2px;
  }
  .icon-btn {
    background: transparent;
    border: 0;
    color: var(--fg);
    width: 40px;
    height: 40px;
    border-radius: 8px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    padding: 0;
    touch-action: manipulation;
  }
  .icon-btn:active { background: var(--bg-elev-2); }
  .icon-btn svg { width: 22px; height: 22px; }

  /* Main screen */
  #screen-main { padding-bottom: env(safe-area-inset-bottom); }
  #button-grid {
    display: grid;
    grid-template-columns: repeat(var(--cols, 2), 1fr);
    grid-template-rows: repeat(var(--rows, 2), 1fr);
    gap: 10px;
    padding: 10px;
    flex: 1;
    min-height: 0;
  }
  .event-btn {
    position: relative;
    border: 0;
    border-radius: 16px;
    font-family: inherit;
    font-size: 22px;
    font-weight: 600;
    padding: 16px;
    cursor: pointer;
    touch-action: manipulation;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    overflow: hidden;
    word-break: break-word;
    line-height: 1.15;
  }
  .event-btn.pressing { animation: press 200ms ease-out; }
  @keyframes press {
    0%   { transform: scale(1);    filter: brightness(1);    }
    35%  { transform: scale(0.94); filter: brightness(1.2);  }
    100% { transform: scale(1);    filter: brightness(1);    }
  }
  .event-count {
    position: absolute;
    top: 10px;
    right: 12px;
    font-size: 14px;
    font-weight: 700;
    background: rgba(0,0,0,0.25);
    padding: 2px 8px;
    border-radius: 999px;
    min-width: 24px;
    text-align: center;
  }
  .event-btn[data-text="dark"] .event-count { background: rgba(255,255,255,0.3); }
  .event-label { padding: 0 4px; }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
    text-align: center;
    color: var(--fg-dim);
    font-size: 15px;
    line-height: 1.5;
  }
  .empty-state strong { color: var(--fg); font-weight: 600; }

  /* Logs screen */
  #screen-logs { padding-bottom: env(safe-area-inset-bottom); }
  .logs-toolbar {
    display: flex;
    gap: 8px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .tool-btn {
    flex: 1;
    padding: 10px 14px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    color: var(--fg);
    border-radius: 10px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    touch-action: manipulation;
  }
  .tool-btn:active { background: var(--bg-elev-2); }
  .tool-btn.danger { color: var(--danger); border-color: rgba(229,57,53,0.4); }
  .tool-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  #log-list { flex: 1; overflow-y: auto; padding: 0 14px; }
  .log-row {
    display: grid;
    grid-template-columns: 1fr auto auto;
    align-items: center;
    gap: 10px;
    padding: 12px 4px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .log-row:last-child { border-bottom: 0; }
  .log-time { color: var(--fg-dim); font-variant-numeric: tabular-nums; font-size: 13px; }
  .log-event { font-weight: 600; }
  .log-delete {
    background: transparent;
    border: 0;
    color: var(--fg-dim);
    font-size: 22px;
    line-height: 1;
    width: 32px;
    height: 32px;
    border-radius: 999px;
    cursor: pointer;
    touch-action: manipulation;
  }
  .log-delete:active { background: var(--bg-elev-2); color: var(--danger); }

  /* Settings screen */
  #screen-settings { padding-bottom: env(safe-area-inset-bottom); }
  #slots { flex: 1; overflow-y: auto; padding: 12px 14px; display: flex; flex-direction: column; gap: 12px; }
  .slot-card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
  }
  .slot-card[data-enabled="false"] .field { opacity: 0.5; }
  .slot-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .slot-title { font-size: 13px; font-weight: 600; color: var(--fg-dim); text-transform: uppercase; letter-spacing: 0.5px; }

  /* Switch */
  .switch { position: relative; display: inline-block; width: 46px; height: 28px; flex-shrink: 0; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute; inset: 0;
    background: var(--bg-elev-2);
    border-radius: 999px;
    transition: background 150ms;
    cursor: pointer;
  }
  .slider::before {
    content: "";
    position: absolute;
    height: 22px; width: 22px;
    left: 3px; top: 3px;
    background: #fff;
    border-radius: 50%;
    transition: transform 150ms;
  }
  .switch input:checked + .slider { background: var(--accent); }
  .switch input:checked + .slider::before { transform: translateX(18px); }

  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
  .field:last-child { margin-bottom: 0; }
  .field > span {
    font-size: 12px;
    color: var(--fg-dim);
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .field input[type="text"] {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--fg);
    border-radius: 8px;
    padding: 10px 12px;
    font-family: inherit;
    font-size: 15px;
    outline: none;
  }
  .field input[type="text"]:focus { border-color: var(--accent); }

  .swatches { display: flex; gap: 8px; flex-wrap: wrap; }
  .swatch {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: 0;
    cursor: pointer;
    padding: 0;
    position: relative;
    touch-action: manipulation;
    box-shadow: inset 0 0 0 2px rgba(255,255,255,0.08);
  }
  .swatch.selected::after {
    content: "";
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 2px solid var(--fg);
  }
</style>
</head>
<body data-screen="main">

  <!-- MAIN -->
  <section id="screen-main" class="screen">
    <header class="header">
      <h1>Events</h1>
      <button class="icon-btn" id="nav-logs" aria-label="Open logs">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      </button>
      <button class="icon-btn" id="nav-settings" aria-label="Open settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </header>
    <div id="button-grid"></div>
    <div id="main-empty" class="empty-state" hidden>
      <strong>No buttons configured</strong>
      <div>Tap the gear icon to set up your event buttons.</div>
    </div>
  </section>

  <!-- LOGS -->
  <section id="screen-logs" class="screen">
    <header class="header">
      <button class="icon-btn" data-back aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <h1>Logs</h1>
    </header>
    <div class="logs-toolbar">
      <button class="tool-btn" id="btn-export">Export CSV</button>
      <button class="tool-btn danger" id="btn-clear">Clear</button>
    </div>
    <div id="log-list"></div>
    <div id="logs-empty" class="empty-state" hidden>
      <strong>No entries yet</strong>
      <div>Press a button on the main screen to record an event.</div>
    </div>
  </section>

  <!-- SETTINGS -->
  <section id="screen-settings" class="screen">
    <header class="header">
      <button class="icon-btn" data-back aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <h1>Settings</h1>
    </header>
    <div id="slots"></div>
  </section>

<script>
(() => {
  const PALETTE = ['#e53935','#fb8c00','#fdd835','#43a047','#00897b','#1e88e5','#8e24aa','#546e7a'];

  // ---------- Store ----------
  const store = {
    config: null,
    log: null,
    loadConfig() {
      try {
        const raw = localStorage.getItem('lc.config');
        if (raw) {
          const parsed = JSON.parse(raw);
          if (Array.isArray(parsed) && parsed.length === 8) return parsed;
        }
      } catch (_) {}
      return Array.from({ length: 8 }, (_, i) => ({
        enabled: false,
        label: `Event ${i + 1}`,
        eventName: `event_${i + 1}`,
        color: PALETTE[i],
      }));
    },
    loadLog() {
      try {
        const raw = localStorage.getItem('lc.log');
        if (raw) {
          const parsed = JSON.parse(raw);
          if (Array.isArray(parsed)) return parsed;
        }
      } catch (_) {}
      return [];
    },
    init() {
      this.config = this.loadConfig();
      this.log = this.loadLog();
    },
    saveConfig() { localStorage.setItem('lc.config', JSON.stringify(this.config)); },
    saveLog()    { localStorage.setItem('lc.log',    JSON.stringify(this.log));    },
    addEntry(eventName) {
      const entry = { ts: new Date().toISOString(), event: eventName };
      this.log.push(entry);
      this.saveLog();
      return entry;
    },
    removeEntry(absoluteIndex) {
      this.log.splice(absoluteIndex, 1);
      this.saveLog();
    },
    clearLog() {
      this.log = [];
      this.saveLog();
    },
    countsByEvent() {
      const out = {};
      for (const e of this.log) out[e.event] = (out[e.event] || 0) + 1;
      return out;
    },
  };

  // ---------- Helpers ----------
  const $ = (sel, root = document) => root.querySelector(sel);
  const escapeHTML = s => String(s).replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
  const escapeAttr = s => String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

  function textColorFor(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return (0.299 * r + 0.587 * g + 0.114 * b) > 150 ? 'dark' : 'light';
  }

  function pad2(n) { return String(n).padStart(2, '0'); }

  function formatLocal(iso) {
    const d = new Date(iso);
    return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())} ${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;
  }

  function csvEscape(s) {
    if (s == null) return '';
    const str = String(s);
    return /[",\n\r]/.test(str) ? `"${str.replace(/"/g, '""')}"` : str;
  }

  function showScreen(name) {
    document.body.dataset.screen = name;
    if (name === 'main')     renderMain();
    if (name === 'logs')     renderLogs();
    if (name === 'settings') renderSettings();
    window.scrollTo(0, 0);
  }

  // ---------- Main screen ----------
  function renderMain() {
    const enabled = store.config.filter(c => c.enabled);
    const grid = $('#button-grid');
    const empty = $('#main-empty');

    if (enabled.length === 0) {
      grid.hidden = true;
      empty.hidden = false;
      grid.innerHTML = '';
      return;
    }
    grid.hidden = false;
    empty.hidden = true;

    const n = enabled.length;
    const [cols, rows] =
      n === 1 ? [1, 1] :
      n === 2 ? [2, 1] :
      n <= 4  ? [2, 2] :
      n <= 6  ? [2, 3] :
                [2, 4];
    grid.style.setProperty('--cols', cols);
    grid.style.setProperty('--rows', rows);

    const counts = store.countsByEvent();

    grid.innerHTML = '';
    for (const slot of enabled) {
      const tone = textColorFor(slot.color);
      const btn = document.createElement('button');
      btn.className = 'event-btn';
      btn.type = 'button';
      btn.style.backgroundColor = slot.color;
      btn.style.color = tone === 'dark' ? '#000' : '#fff';
      btn.dataset.text = tone;
      btn.dataset.event = slot.eventName;
      btn.innerHTML = `
        <span class="event-count">${counts[slot.eventName] || 0}</span>
        <span class="event-label">${escapeHTML(slot.label || '(unnamed)')}</span>
      `;
      btn.addEventListener('click', () => onPress(btn, slot.eventName));
      grid.appendChild(btn);
    }
  }

  function onPress(btn, eventName) {
    store.addEntry(eventName);
    const countEl = btn.querySelector('.event-count');
    countEl.textContent = (parseInt(countEl.textContent, 10) || 0) + 1;
    btn.classList.remove('pressing');
    void btn.offsetWidth;
    btn.classList.add('pressing');
    if (navigator.vibrate) navigator.vibrate(15);
  }

  // ---------- Logs screen ----------
  function renderLogs() {
    const list = $('#log-list');
    const empty = $('#logs-empty');
    const exportBtn = $('#btn-export');
    const clearBtn  = $('#btn-clear');

    exportBtn.disabled = store.log.length === 0;
    clearBtn.disabled  = store.log.length === 0;

    if (store.log.length === 0) {
      list.hidden = true;
      empty.hidden = false;
      list.innerHTML = '';
      return;
    }
    list.hidden = false;
    empty.hidden = true;

    const rows = [];
    for (let i = store.log.length - 1; i >= 0; i--) {
      const e = store.log[i];
      rows.push(
        `<div class="log-row" data-index="${i}">
           <span class="log-event">${escapeHTML(e.event)}</span>
           <span class="log-time">${escapeHTML(formatLocal(e.ts))}</span>
           <button class="log-delete" data-delete="${i}" aria-label="Delete entry">&times;</button>
         </div>`
      );
    }
    list.innerHTML = rows.join('');
  }

  function onDeleteRow(idx) {
    const entry = store.log[idx];
    if (!entry) return;
    if (!confirm(`Delete this entry?\n\n${entry.event} — ${formatLocal(entry.ts)}`)) return;
    store.removeEntry(idx);
    renderLogs();
  }

  function exportCSV() {
    if (store.log.length === 0) return;
    const lines = ['timestamp,event'];
    for (const e of store.log) lines.push(`${csvEscape(e.ts)},${csvEscape(e.event)}`);
    const blob = new Blob([lines.join('\n') + '\n'], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const d = new Date();
    const filename = `events-${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}-${pad2(d.getHours())}${pad2(d.getMinutes())}.csv`;
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 0);
  }

  // ---------- Settings screen ----------
  function renderSettings() {
    const container = $('#slots');
    container.innerHTML = '';

    store.config.forEach((slot, i) => {
      const card = document.createElement('div');
      card.className = 'slot-card';
      card.dataset.enabled = String(slot.enabled);
      card.innerHTML = `
        <div class="slot-header">
          <span class="slot-title">Slot ${i + 1}</span>
          <label class="switch">
            <input type="checkbox" data-field="enabled" ${slot.enabled ? 'checked' : ''}>
            <span class="slider"></span>
          </label>
        </div>
        <label class="field">
          <span>Button label</span>
          <input type="text" data-field="label" value="${escapeAttr(slot.label)}" maxlength="40">
        </label>
        <label class="field">
          <span>Event name (in log)</span>
          <input type="text" data-field="eventName" value="${escapeAttr(slot.eventName)}" maxlength="60">
        </label>
        <div class="field">
          <span>Color</span>
          <div class="swatches">
            ${PALETTE.map(c =>
              `<button type="button" class="swatch${c === slot.color ? ' selected' : ''}" data-color="${c}" style="background:${c}" aria-label="Color ${c}"></button>`
            ).join('')}
          </div>
        </div>
      `;

      card.querySelector('[data-field="enabled"]').addEventListener('change', e => {
        slot.enabled = e.target.checked;
        card.dataset.enabled = String(slot.enabled);
        store.saveConfig();
      });
      card.querySelector('[data-field="label"]').addEventListener('input', e => {
        slot.label = e.target.value;
        store.saveConfig();
      });
      card.querySelector('[data-field="eventName"]').addEventListener('input', e => {
        slot.eventName = e.target.value;
        store.saveConfig();
      });
      card.querySelectorAll('.swatch').forEach(sw => {
        sw.addEventListener('click', () => {
          slot.color = sw.dataset.color;
          store.saveConfig();
          card.querySelectorAll('.swatch').forEach(s =>
            s.classList.toggle('selected', s.dataset.color === slot.color)
          );
        });
      });

      container.appendChild(card);
    });
  }

  // ---------- Wiring ----------
  function wire() {
    $('#nav-logs').addEventListener('click', () => showScreen('logs'));
    $('#nav-settings').addEventListener('click', () => showScreen('settings'));
    document.querySelectorAll('[data-back]').forEach(b =>
      b.addEventListener('click', () => showScreen('main'))
    );
    $('#btn-export').addEventListener('click', exportCSV);
    $('#btn-clear').addEventListener('click', () => {
      if (store.log.length === 0) return;
      if (!confirm(`Clear all ${store.log.length} log entries? This cannot be undone.`)) return;
      store.clearLog();
      renderLogs();
    });
    $('#log-list').addEventListener('click', e => {
      const target = e.target.closest('[data-delete]');
      if (!target) return;
      onDeleteRow(parseInt(target.dataset.delete, 10));
    });
  }

  // ---------- Boot ----------
  store.init();
  wire();
  showScreen('main');

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
  }
})();
</script>
</body>
</html>
